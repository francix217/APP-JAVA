<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>

<body>

<h1>⚙️ Panel de Administración - Usuarios</h1>

<div class="container">

    <!-- 🔥 Botón centrado -->
    <div class="acciones-top">
        <a th:href="@{/adm/users/edit}">
            <button class="nuevo">➕ Nuevo Usuario</button>
        </a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Contraseña</th>
                <th>Rol</th>
                <th>Género</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.usuario}"></td>
                <td th:text="${u.contrasena}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.genero}"></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
