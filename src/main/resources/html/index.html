<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GymTech</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="login-box">
    <h1>💪 GymTech</h1>

    <!-- TABS PRINCIPALES -->
    <div class="tabs">
        <div class="tab active" id="adminTab">ADMIN</div>
        <div class="tab" id="userTab">USUARIO</div>
    </div>

    <!-- SUBTABS -->
    <div class="subtabs" id="userOptions" style="display:none;">
        <div class="subtab active" id="loginUserTab">INICIAR SESIÓN</div>
        <div class="subtab" id="registerUserTab">REGISTRARSE</div>
    </div>

    <form id="loginForm">

        <!-- USUARIO -->
        <div class="input-group">
            <span>👤</span>
            <input type="text" id="usuario" placeholder="Usuario" required>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
            <span>🔒</span>
            <input type="password" id="password" placeholder="Contraseña" required>
            <span id="togglePass" style="cursor:pointer;">👁</span>
        </div>

        <!-- GENERO SOLO REGISTRO -->
        <select id="genero" style="display:none;">
            <option value="">Seleccionar género</option>
            <option>MASCULINO</option>
            <option>FEMENINO</option>
            <option>NO_BINARIO</option>
            <option>OTRO</option>
        </select>

        <button type="submit">Ingresar</button>

        <p id="error" class="error"></p>
        <p id="success" class="success"></p>

    </form>
</div>

<script src="../javascript/jquery-4.0.0.min.js"></script>
<script src="../javascript/functions.js"></script>

</body>
</html>
